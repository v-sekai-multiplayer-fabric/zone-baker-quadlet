name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      parent_version:
        description: linux-base-image release tag to layer on. Empty uses the default in build.pkr.hcl.
        required: false
        type: string
  schedule:
    # Weekly rebuild to pick up upstream + dnf updates.
    - cron: "0 6 * * 1"

permissions:
  contents: write   # to upload release assets

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install qemu + packer
        run: |
          sudo apt-get update
          # xorriso is what packer's qemu builder uses to create the cidata ISO.
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf xorriso
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo gpg --dearmor -o /usr/share/keyrings/hashicorp-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
          sudo apt-get update && sudo apt-get install -y packer
          packer version

      - name: Enable KVM access
        run: |
          sudo usermod -aG kvm "$USER"
          sudo chmod 666 /dev/kvm

      - name: Prepare cidata
        working-directory: packer
        run: bash scripts/prepare-cidata.sh

      - name: Packer init
        working-directory: packer
        run: packer init build.pkr.hcl

      - name: Packer build
        working-directory: packer
        env:
          PKR_VAR_version: ${{ github.ref_name }}
          PARENT_VERSION: ${{ inputs.parent_version }}
        run: |
          ARGS=""
          if [ -n "$PARENT_VERSION" ]; then
            ARGS="-var source_image_url=https://github.com/v-sekai-multiplayer-fabric/linux-base-image/releases/download/${PARENT_VERSION}/linux-base-image.qcow2"
            ARGS="$ARGS -var source_image_checksum=file:https://github.com/v-sekai-multiplayer-fabric/linux-base-image/releases/download/${PARENT_VERSION}/linux-base-image.qcow2.sha512"
          fi
          sudo -E packer build $ARGS build.pkr.hcl

      - name: Hash output
        working-directory: output
        run: |
          # packer ran under sudo, so the qcow2 is root-owned. Chown
          # back to the runner so the subsequent sha512sum + upload
          # steps can write here without sudo.
          sudo chown -R "$USER:$USER" .
          sha512sum zone-baker-image.qcow2 > zone-baker-image.qcow2.sha512
          ls -lh

      - name: Upload artifact (non-tag pushes)
        if: github.event_name != 'push' || !startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: zone-baker-image-${{ github.sha }}
          path: |
            output/zone-baker-image.qcow2
            output/zone-baker-image.qcow2.sha512
          retention-days: 14

      - name: Upload to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "zone-baker-image ${{ github.ref_name }}" \
            --notes "Automated build from ${{ github.sha }}." \
            output/zone-baker-image.qcow2 \
            output/zone-baker-image.qcow2.sha512 \
            || gh release upload "${{ github.ref_name }}" \
            output/zone-baker-image.qcow2 \
            output/zone-baker-image.qcow2.sha512 \
            --clobber
